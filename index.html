<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMU VIP MOD V1 - Ultimate Premium Floating Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Outfit:wght@600;800;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #ffffff;
            --electric-blue: #00d9ff;
            --luxury-gold: #fbbf24;
            --deep-gold: #d97706;
            --danger: #ef4444;
            --success: #10b981;
            --dark-panel: rgba(10, 8, 5, 0.98);
            --vip-glow: 0 0 30px rgba(251, 191, 36, 0.8);
            --neon-glow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030207;
        }

        body {
            color: var(--white);
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        .hidden { 
            display: none !important; 
        }

        /* ========== GAME BACKGROUND BLOCK ========== */
        .game-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        /* ========== MAIN CONTAINER ========== */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* LOGIN SCREEN */
        .auth-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1204 0%, #030207 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999; 
            pointer-events: auto;
        }

        /* ========== GOLDEN VIP LOGIN PANEL ========== */
        .login-box {
            max-width: 400px;
            width: 90%;
            background: rgba(15, 11, 5, 0.96);
            border: 2px solid var(--luxury-gold);
            box-shadow: var(--vip-glow), inset 0 0 25px rgba(251, 191, 36, 0.3);
            border-radius: 24px;
            padding: 35px 25px;
            backdrop-filter: blur(25px);
            text-align: center;
        }

        .login-box h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 10%, var(--luxury-gold), var(--deep-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .login-box p {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 3px;
            margin-bottom: 25px;
        }

        /* ========== PREMIUM GOLDEN FLOATING PANEL (Shifted a bit UP) ========== */
        .glass-box.app-view {
            position: fixed;
            top: 10px; /* थोड़ा सा और ऊपर परफेक्ट जगह पर फिट किया */
            left: 50%;
            transform: translateX(-50%);
            max-width: 380px;
            width: 92%;
            background: var(--dark-panel);
            border: 3px solid var(--luxury-gold);
            border-radius: 22px;
            padding: 18px;
            backdrop-filter: blur(25px);
            box-shadow: var(--vip-glow), inset 0 0 20px rgba(251, 191, 36, 0.25);
            z-index: 9999;
            pointer-events: auto;
            transition: opacity 0.3s ease, transform 0.3s ease;
            opacity: 1;
        }

        .glass-box.app-view.hidden-panel {
            opacity: 0;
            transform: translateX(-50%) translateY(-200px) scale(0.6);
            pointer-events: none;
        }

        .logo-3d {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, var(--luxury-gold), var(--deep-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.7);
            margin-bottom: 8px;
        }

        /* ========== DRAGGABLE BUTTON WITH BLINKING LIGHTS ========== */
        .toggle-panel-btn {
            position: fixed;
            bottom: 40px;
            right: 25px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--luxury-gold), #78350f);
            border: 3px solid var(--white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: move; /* इंडिकेटर कि इसे घुमाया जा सकता है */
            z-index: 100000;
            pointer-events: auto;
            touch-action: none; /* मोबाइल ड्रैगिंग के लिए ज़रूरी */
            
            /* बटन के आसपास चालू-बंद होने वाली जादुई नियॉन लाइट */
            animation: blinkingLight 1.2s infinite alternate;
        }

        .toggle-panel-btn::before {
            content: "🃏"; 
            font-size: 32px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6));
        }

        .toggle-panel-btn.panel-is-hidden {
            background: linear-gradient(135deg, #451a03, #1e1b4b);
        }
        
        .toggle-panel-btn.panel-is-hidden::before {
            content: "🎩";
        }

        /* बटन लाइट चमकाने का एनीमेशन */
        @keyframes blinkingLight {
            0% {
                box-shadow: 0 0 10px rgba(251, 191, 36, 0.5), inset 0 0 5px rgba(255,255,255,0.4);
                border-color: rgba(255, 255, 255, 0.6);
            }
            100% {
                box-shadow: 0 0 35px rgba(251, 191, 36, 1), 0 0 15px var(--electric-blue), inset 0 0 15px rgba(255,255,255,0.9);
                border-color: var(--luxury-gold);
            }
        }

        /* ========== INPUTS & PREMIUM BUTTONS ========== */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(10, 5, 2, 0.95);
            border: 2px solid var(--luxury-gold);
            border-radius: 14px;
            color: var(--luxury-gold);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 15px;
            text-align: center;
            outline: none;
            letter-spacing: 2px;
            margin-bottom: 18px;
        }
        input[type="text"]:focus {
            border-color: #fff;
            box-shadow: var(--vip-glow);
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #78350f, var(--luxury-gold), #78350f);
            border: 1px solid var(--white);
            border-radius: 14px;
            color: var(--white);
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            transition: 0.3s;
        }
        .btn-main:hover {
            box-shadow: 0 0 35px var(--luxury-gold);
        }

        .telegram-btn {
            display: block;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(90deg, #0088cc, #00a2ff);
            padding: 13px;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 800;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
        }

        #err {
            color: var(--danger);
            font-size: 13px;
            margin-top: 12px;
            font-weight: 700;
        }

        /* ========== RESULT DISPLAY ========== */
        .prediction-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(251, 191, 36, 0.08);
            border: 2px solid rgba(251, 191, 36, 0.4);
            padding: 12px 15px;
            border-radius: 14px;
            margin: 14px 0;
        }

        .period-display {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            font-weight: 700;
        }
        .period-display span {
            display: block;
            font-size: 16px;
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            margin-top: 2px;
        }

        .prediction-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: var(--luxury-gold);
            text-shadow: 0 0 20px var(--luxury-gold);
        }

        .opportunities-box {
            font-size: 12px;
            font-weight: 800;
            color: var(--electric-blue);
            background: rgba(0, 217, 255, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 217, 255, 0.4);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat-card {
            background: rgba(251, 191, 36, 0.03);
            border: 1px solid rgba(251,191,36,0.15);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 800;
            font-family: 'Orbitron', sans-serif;
        }

        #signalStrength { color: var(--success); text-shadow: 0 0 8px var(--success); }
        #periodLabel { color: var(--luxury-gold); }

        .table-container {
            max-height: 130px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }

        th {
            background: rgba(251, 191, 36, 0.25);
            color: var(--luxury-gold);
            padding: 10px;
            font-weight: 800;
        }

        td {
            padding: 8px;
            text-align: center;
            background: rgba(15, 10, 5, 0.7);
            border-bottom: 1px solid rgba(251,191,36,0.08);
        }

        .win { color: var(--success); font-weight: 900; text-shadow: 0 0 8px var(--success); }
        .loss { color: var(--danger); font-weight: 900; text-shadow: 0 0 8px var(--danger); }

        .logout-btn {
            background: transparent;
            color: var(--luxury-gold);
            border: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        .logout-btn:hover { color: var(--danger); text-shadow: 0 0 5px var(--danger); }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- BACKGROUND GAME BLOCK -->
    <iframe class="game-background" src="https://bdgwinmy.cc//#/register?invitationCode=8261315097340"></iframe>

    <!-- MAIN INTERFACE -->
    <div class="main-container">
        
        <!-- LOGIN OVERLAY -->
        <div id="authBlock" class="auth-wrapper" onclick="triggerVoiceInit()">
            <div class="login-box">
                <h2>RAMU VIP V1</h2>
                <p>PREMIUM GOLDEN EDITION</p>
                <div class="input-wrapper">
                    <input type="text" id="keyIn" placeholder="ENTER LICENSE KEY" onfocus="triggerVoiceInit()">
                </div>
                <button class="btn-main" onclick="startSystem()">ACTIVATE SYSTEM</button>
                <p id="err"></p>
                <a href="https://t.me/+lG3hYVaX7GxkYjc1" target="_blank" class="telegram-btn">📱 JOIN TELEGRAM GROUP</a>
            </div>
        </div>

        <!-- MOVABLE FLOATING JOKER BUTTON -->
        <div id="toggleBtn" class="toggle-panel-btn hidden"></div>

        <!-- FLOATING PANEL PAGE (STAYS UP) -->
        <div id="appPage" class="glass-box app-view hidden">
            <div class="logo-3d">RAMU VIP V1</div>

            <!-- PREDICTION SECTION -->
            <div class="prediction-section">
                <div class="period-display">
                    PERIOD
                    <span id="pID">--</span>
                </div>
                <div class="prediction-value" id="pRes">WAIT</div>
                <div class="opportunities-box" id="pOpps">N: --</div>
            </div>

            <!-- STATS GRID -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">SIGNAL</div>
                    <div class="stat-value" id="signalStrength">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">LAST ID</div>
                    <div class="stat-value" id="periodLabel">--</div>
                </div>
            </div>

            <!-- HISTORY TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>PERIOD</th>
                            <th>PRED</th>
                            <th>RES</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="logs"></tbody>
                </table>
            </div>

            <button class="logout-btn" onclick="logout()">↳ LOCK SYSTEM</button>
        </div>
    </div>

    <script>
        const BIG_POOL = [5, 6, 7, 8, 9];
        const SMALL_POOL = [0, 1, 2, 3, 4];
        let currentOpposites = [];
        let voiceTriggered = false;

        // कड़क परमानेंट वॉयस इंजन (ब्राउज़र फ्रेंडली)
        function speakVoice(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                utterance.pitch = 1.1;
                utterance.rate = 0.95;
                window.speechSynthesis.speak(utterance);
            }
        }

        // ब्राउज़र ब्लॉकिंग बाईपास करने के लिए फ़ंक्शन
        function triggerVoiceInit() {
            if (!voiceTriggered) {
                voiceTriggered = true;
                // पहला टच होते ही टेलीग्राम वॉयस अलर्ट चालू हो जाएगा
                speakVoice("आपको नीचे टेलीग्राम का लिंक दिख रहा होगा, उस पर जाकर आप पासवर्ड मांग सकते हैं।");
            }
        }

        // ================== ANYWHERE DRAGGABLE BUTTON SYSTEM ==================
        const dragBtn = document.getElementById("toggleBtn");
        let isDragging = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0, yOffset = 0;
        let hasMoved = false;

        dragBtn.addEventListener("touchstart", dragStart, {passive: false});
        dragBtn.addEventListener("touchend", dragEnd, {passive: false});
        dragBtn.addEventListener("touchmove", drag, {passive: false});

        dragBtn.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);

        function dragStart(e) {
            hasMoved = false;
            let clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            let clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            
            initialX = clientX - xOffset;
            initialY = clientY - yOffset;

            if (e.target === dragBtn) {
                isDragging = true;
            }
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                hasMoved = true;
                let clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                let clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;

                currentX = clientX - initialX;
                currentY = clientY - initialY;

                xOffset = currentX;
                yOffset = currentY;

                dragBtn.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;

            // अगर सिर्फ क्लिक किया है (हिलाया नहीं), तो पैनल बंद/चालू होगा
            if (!hasMoved && e.target === dragBtn) {
                togglePanel();
            }
        }

        function togglePanel() {
            const panel = document.getElementById('appPage');
            if (panel.classList.contains('hidden-panel')) {
                panel.classList.remove('hidden-panel');
                dragBtn.classList.remove('panel-is-hidden');
            } else {
                panel.classList.add('hidden-panel');
                dragBtn.classList.add('panel-is-hidden');
            }
        }

        // ======================================================================

        async function startSystem() {
            const key = document.getElementById('keyIn').value.trim();
            
            if (!key) {
                document.getElementById('err').innerText = "ENTER LICENSE KEY!";
                return;
            }

            if (key === "RAMU BHAI BOSS 1") {
                document.getElementById('err').innerText = "";
                
                document.getElementById('authBlock').classList.add('hidden');
                document.getElementById('appPage').classList.remove('hidden');
                dragBtn.classList.remove('hidden'); 
                
                setTimeout(() => {
                    speakVoice("आपका गेम में स्वागत है। आपको पहले रजिस्टर करना पड़ेगा। रजिस्टर करने के बाद आपको गेम के अंदर पांच सौ या वन के का डिपॉजिट करके आपका अकाउंट एक्टिवेट हो जाएगा।");
                }, 800);

                runLogic();
            } else {
                document.getElementById('err').innerText = "INVALID LICENSE KEY!";
            }
        }

        function analyzeDeepPatterns(list) {
            if (!list || list.length < 5) return "BIG";

            const sizes = list.slice(0, 20).map(x => parseInt(x.number) >= 5 ? "BIG" : "SMALL");
            
            let currentStreak = 1;
            for (let i = 0; i < sizes.length - 1; i++) {
                if (sizes[i] === sizes[i+1]) {
                    currentStreak++;
                } else {
                    break;
                }
            }

            if (currentStreak >= 5) {
                return sizes[0] === "BIG" ? "SMALL" : "BIG";
            }

            if (sizes[0] !== sizes[1] && sizes[1] === sizes[2] && sizes[2] !== sizes[3]) {
                return sizes[0] === "BIG" ? "SMALL" : "BIG";
            }

            let bigScore = 0;
            let smallScore = 0;
            
            list.slice(0, 15).forEach((item, index) => {
                const num = parseInt(item.number);
                const weight = (15 - index);
                
                if (num >= 5) bigScore += weight;
                else smallScore += weight;
            });

            return bigScore >= smallScore ? "BIG" : "SMALL";
        }

        async function runLogic() {
            if (window.logicInterval) clearInterval(window.logicInterval);
            
            window.logicInterval = setInterval(async () => {
                try {
                    const res = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json');
                    const json = await res.json();
                    const listData = json.data.list;
                    const latest = listData[0];

                    const nextPred = analyzeDeepPatterns(listData);

                    if (window.lastId !== latest.issueNumber) {
                        const actualSize = parseInt(latest.number) >= 5 ? "BIG" : "SMALL";
                        let checkAgainst = window.savedPrediction || nextPred;

                        const sameSide = checkAgainst === "BIG" ? BIG_POOL : SMALL_POOL;
                        const oppSide = checkAgainst === "BIG" ? SMALL_POOL : BIG_POOL;

                        currentOpposites = [
                            sameSide[Math.floor(Math.random() * sameSide.length)],
                            oppSide[Math.floor(Math.random() * oppSide.length)]
                        ];

                        if (window.lastId) {
                            const isWin = (checkAgainst === actualSize) || currentOpposites.includes(parseInt(latest.number));
                            const statusText = isWin ? 'WIN' : 'LOSS';

                            const row = `
                                <tr>
                                    <td>${latest.issueNumber.slice(-3)}</td>
                                    <td>${checkAgainst}</td>
                                    <td>${latest.number}</td>
                                    <td class="${isWin ? 'win' : 'loss'}">${statusText}</td>
                                </tr>
                            `;
                            document.getElementById('logs').innerHTML = row + document.getElementById('logs').innerHTML;
                            
                            setTimeout(() => {
                                if (isWin) {
                                    speakVoice(`रिजल्ट ${actualSize} आया है, आपका बेट विन है!`);
                                } else {
                                    speakVoice(`रिजल्ट ${actualSize} आया है, आपका बेट लॉस है!`);
                                }
                            }, 500);
                        }

                        window.lastId = latest.issueNumber;
                        window.savedPrediction = nextPred;
                        window.savedOpps = currentOpposites;

                        setTimeout(() => {
                            speakVoice(`अगला प्रेडिक्शन ${nextPred} है`);
                        }, 4000);
                    }

                    document.getElementById('pID').innerText = (BigInt(latest.issueNumber) + 1n).toString().slice(-4);
                    document.getElementById('pRes').innerText = nextPred;
                    document.getElementById('pOpps').innerText = "N: " + currentOpposites.join(",");
                    document.getElementById('periodLabel').innerText = latest.issueNumber.slice(-3);
                    document.getElementById('signalStrength').innerText = (85 + Math.random() * 15).toFixed(0) + '%';

                } catch (e) {
                    document.getElementById('pRes').innerText = 'ERR';
                }
            }, 3000);
        }

        function logout() {
            location.reload(); 
        }

        // डिफ़ॉल्ट रूप से हमेशा लॉक रहेगा
        window.onload = () => {
            document.getElementById('authBlock').classList.remove('hidden');
            document.getElementById('appPage').classList.add('hidden');
            dragBtn.classList.add('hidden');
        };
    </script>
</body>
</html>
