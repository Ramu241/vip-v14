                }
            }, 2000);
        }

        function logout() { location.reload(); }

        window.onload = () => {
            document.getElementById('authBlock').classList.remove('hidden');
            document.getElementById('toggleBtn').classList.add('hidden');
            document.getElementById('appPage').classList.add('hidden');
        };
    </script>
</body>
</html>
